name: Deploy App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: 'Name of the application to deploy'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      APP_NAME: ${{ github.event.inputs.app-name }}
      ZB_TOKEN: ${{ secrets.ZB_TOKEN }}

    steps:
      - name: Resolve environment from branch
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            main) ENV_NAME="prod" ;;
            uat)  ENV_NAME="demo" ;;
            qa)   ENV_NAME="qa" ;;
            dev)  ENV_NAME="dev" ;;
            *)
              echo "::error::Unsupported branch '$BRANCH'. Supported branches: main, uat, qa, dev"
              exit 1
              ;;
          esac
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV

      - name: Validate inputs
        shell: bash
        run: |
          if [[ -z "${{ github.event.inputs.app-name }}" ]]; then
            echo "::error::app-name is required and cannot be empty"
            exit 1
          fi

          if [[ ! "${{ github.event.inputs.app-name }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::app-name contains invalid characters. Only alphanumeric, hyphens, and underscores are allowed."
            exit 1
          fi

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v2.4.3
        with:
          method: jwt
          url: ${{ secrets.VAULT_ADDR }}
          role: zb-org-login-publish
          path: gh-actions
          secrets: |
            operations-kv/data/github/zb-org/login/${{ env.ENV_NAME }} bucketName | S3_BUCKET ;
            operations-kv/data/github/zb-org/login/${{ env.ENV_NAME }} accountId | AWS_ACCOUNT_ID ;
            operations-kv/data/github/zb-org/login/${{ env.ENV_NAME }} distributionId | CF_DISTRIBUTION_ID ;
            operations-kv/data/ci/slack releasesWebhook | SLACK_RELEASES_WEBHOOK ;

      - name: Debug values
        run: |
          echo "App: $APP_NAME"
          echo "Env: $ENV_NAME"
          echo "Account: $AWS_ACCOUNT_ID"
          echo "Bucket: $S3_BUCKET"
          echo "CF Distribution: $CF_DISTRIBUTION_ID"

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy app
        uses: zerobias-org/devops/actions/static-s3-app-release@main
        with:
          app-name: ${{ env.APP_NAME }}
          app-base-path: package
          s3-bucket: ${{ env.S3_BUCKET }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh-zb-org-login-${{ env.ENV_NAME }}-custom-ui-s3-rw

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths "/${{ env.APP_NAME }}/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "Waiting for invalidation $INVALIDATION_ID to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"
          echo "CloudFront invalidation completed."

      - name: Release Announcement
        id: slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":rocket: ${{ env.APP_NAME }} deployed to ${{ env.ENV_NAME }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Repo:* `${{ github.repository }}`\n*Bucket:* `${{ env.S3_BUCKET }}`\n*Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_RELEASES_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
